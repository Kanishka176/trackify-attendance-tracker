<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trackify - Login</title>
    
    <link rel="stylesheet" href="login_reg.css">
</head>
<body>

    <div class="login-card">
        <h1>Trackify</h1>
        <p>Simple Attendance Management</p>

        <form id="loginForm">
            <div class="input-group">
                <label>Login Role</label>
                <select id="role">
                    <option value="Teacher">Teacher</option>
                    <option value="Student">Student</option>
                    <option value="Admin">Admin</option>
                </select>
            </div>

            <div class="input-group">
                <label>Email Address</label>
                <input type="email" id="email" placeholder="Enter login ID" autocomplete="email" required>
            </div>

           <div class="input-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="Enter password" autocomplete="current-password" required>
            </div>

            <div style="text-align: right; margin-bottom: 15px;">
                <a href="forgot_password.html" style="font-size: 14px; color: #2d6a4f;">Forgot Password?</a>
            </div>

            <button type="button" id="loginBtn">Log In</button>
        </form>

        <p id="message"></p>
    </div>

    <script src="login.js"></script>
</body>
</html>
