<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trackify - Register</title>
    
    <link rel="stylesheet" href="login_reg.css">
</head>
<body>

    <div class="login-card">
        <h1>Create Account</h1>
        <p>Join Trackify today</p>

        <form id="registerForm">
            <div class="input-group">
                <label>Full Name</label>
                <input type="text" id="fullName" placeholder="Enter your name" required>
            </div>

            <div class="input-group">
                <label>Email Address</label>
                <input type="email" id="regEmail" placeholder="Enter email" required>
            </div>

            <div class="input-group">
                <label>Role</label>
                <select id="regRole" required>
                    <option value="Student">Student</option>
                    <option value="Teacher">Teacher</option>
                    <option value="Admin">Admin</option>
                </select>
            </div>

            <div class="input-group">
                <label>Scholar Number (Optional)</label>
                <input type="text" id="scholarNo" placeholder="Enter your scholar number">
            </div>

            <div class="input-group">
                <label>Password</label>
                <input type="password" id="regPassword" placeholder="Create password" autocomplete="new-password" required>
            </div>

            <div class="input-group">
                <label>Confirm Password</label>
                <input type="password" id="confirmPassword" placeholder="Repeat password" autocomplete="new-password" required>
            </div>

            <button type="button" id="registerBtn">Register</button>
        </form>
        
        <p id="regMessage"></p>
        <p style="font-size: 14px; margin-top: 10px;">
            Already have an account? <a href="login.html" style="color: #2d6a4f;">Login here</a>
        </p>
    </div>

    <script src="registeration.js"></script>
</body>
</html>
