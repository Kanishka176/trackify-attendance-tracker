<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trackify - Reset Password</title>
    <link rel="stylesheet" href="login_reg.css">
</head>
<body>

    <div class="login-card">
        <h1>Reset Password</h1>
        <p>Enter your details to set a new password</p>

        <form id="forgotPasswordForm">
            <div class="input-group">
                <label>Email Address</label>
                <input type="email" id="resetEmail" placeholder="Enter your registered email" autocomplete="email" required>
            </div>

            <div class="input-group">
                <label>New Password</label>
                <input type="password" id="newPassword" placeholder="Enter your new password" autocomplete="new-password" required>
            </div>

            <div class="input-group">
                <label>Confirm Password</label>
                <input type="password" id="confirmPassword" placeholder="Confirm your new password" autocomplete="new-password" required>
            </div>

            <button type="button" id="resetBtn">Update Password</button>
        </form>
        <p id="resetMessage"></p>
        <p style="font-size: 14px; margin-top: 15px;">
            Remember your password? <a href="login.html" style="color: #2d6a4f;">Back to Login</a>
        </p>
    </div>

    <script>
        document.getElementById('resetBtn').addEventListener('click', async function() {
            const email = document.getElementById('resetEmail').value;
            const newPass = document.getElementById('newPassword').value;
            const confirmPass = document.getElementById('confirmPassword').value;
            const message = document.getElementById('resetMessage');

            // Validation
            if (email === "" || newPass === "" || confirmPass === "") {
                message.innerText = "Please fill in all fields.";
                message.style.color = "red";
                return;
            }

            if (newPass !== confirmPass) {
                message.innerText = "Passwords do not match.";
                message.style.color = "red";
                return;
            }

            if (newPass.length < 6) {
                message.innerText = "Password must be at least 6 characters.";
                message.style.color = "red";
                return;
            }

            try {
                // Send reset request to backend
                const response = await fetch('/api/reset-password', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        email: email,
                        newPassword: newPass
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    message.innerText = "Password updated successfully! Redirecting to login...";
                    message.style.color = "green";
                    setTimeout(() => {
                        window.location.href = "login.html";
                    }, 2000);
                } else {
                    message.innerText = data.message || "Failed to reset password.";
                    message.style.color = "red";
                }
            } catch (error) {
                console.error('Error:', error);
                message.innerText = "Error connecting to server. Please try again.";
                message.style.color = "red";
            }
        });
    </script>
</body>
</html>
